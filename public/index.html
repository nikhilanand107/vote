<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVote - Online Voting System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container auth-container">
        
        <!-- Login Form -->
        <div id="login-section" class="glass-card">
            <h2 class="text-gradient" style="text-align: center; font-size: 2rem; margin-bottom: 2rem;">SecureVote</h2>
            <h3>Welcome Back</h3>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Log in to cast your vote.</p>
            
            <form id="login-form">
                <div class="form-group" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="loginRole" value="voter" checked> Voter / Admin
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="loginRole" value="candidate"> Candidate
                    </label>
                </div>
                <div class="form-group">
                    <label for="login-aadhar">Aadhar Card Number</label>
                    <input type="text" id="login-aadhar" class="form-control" required placeholder="Enter your 12-digit Aadhar">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
                </div>
                <div id="login-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary btn-block">Log In</button>
            </form>
            
            <div class="auth-switch">
                Don't have an account? <a href="#" id="show-signup">Sign up here</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signup-section" class="glass-card hidden">
            <h2 class="text-gradient" style="text-align: center; font-size: 2rem; margin-bottom: 2rem;">SecureVote</h2>
            <h3>Create Account</h3>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Register to participate in elections.</p>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="signup-age">Age</label>
                    <input type="number" id="signup-age" class="form-control" required min="18">
                </div>
                <div class="form-group">
                    <label for="signup-aadhar">Aadhar Card Number</label>
                    <input type="text" id="signup-aadhar" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="signup-address">Address</label>
                    <input type="text" id="signup-address" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" class="form-control" required>
                </div>
                <div id="signup-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            </form>
            
            <div class="auth-switch">
                Already have an account? <a href="#" id="show-login">Log in here</a>
            </div>
        </div>

    </div>

    <script src="js/auth.js"></script>
</body>
</html>
