<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVote - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header glass-card" style="margin-bottom: 2rem;">
            <div>
                <h2 class="text-gradient" style="margin-bottom: 0;">SecureVote</h2>
                <p id="user-greeting" style="color: var(--text-secondary); margin-top: 0.5rem;">Loading profile...</p>
            </div>
            <div class="user-info">
                <span id="vote-status" class="voted-badge hidden" style="margin-top: 0;"></span>
                <button id="logout-btn" class="btn" style="background: rgba(255,255,255,0.1); color: white;">Logout</button>
            </div>
        </header>

        <!-- Admin Section -->
        <div id="admin-section" class="glass-card hidden" style="margin-bottom: 2rem;">
            <h3>Admin Panel</h3>
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">Add a new candidate to the election.</p>
            <form id="add-candidate-form" style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px;">
                    <label>Name</label>
                    <input type="text" id="cand-name" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px;">
                    <label>Party</label>
                    <input type="text" id="cand-party" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 80px;">
                    <label>Age</label>
                    <input type="number" id="cand-age" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px;">
                    <label>Aadhar</label>
                    <input type="text" id="cand-aadhar" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px;">
                    <label>Password</label>
                    <input type="password" id="cand-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="height: fit-content;">Add Candidate</button>
            </form>
            <div id="admin-error" class="error-msg"></div>
        </div>

        <!-- Candidates Grid -->
        <h2 style="margin-bottom: 1.5rem;">Candidates</h2>
        <div id="candidates-grid" class="grid">
            <!-- Loading placeholder -->
            <div style="color: var(--text-secondary);">Loading candidates...</div>
        </div>
    </div>

    <!-- Edit Modal (Hidden by default) -->
    <div id="edit-modal" class="glass-card hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; min-width: 400px; box-shadow: 0 0 100px rgba(0,0,0,0.5);">
        <h3>Edit Candidate</h3>
        <form id="edit-candidate-form">
            <input type="hidden" id="edit-cand-id">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="edit-cand-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Party</label>
                <input type="text" id="edit-cand-party" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="edit-cand-age" class="form-control" required>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="button" id="close-edit-modal" class="btn" style="background: rgba(255,255,255,0.1); color: white; flex: 1;">Cancel</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
            </div>
        </form>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
